<!DOCTYPE html>
<html>
<head>
    <style>
        body { text-align: center; font-family: sans-serif; color: #333; margin: 0; padding: 10px; background-color: transparent;}
        video { border: 3px solid #b764d4; border-radius: 10px; width: 100%; max-width: 400px; }
        #countdown { font-size: 60px; color: #b764d4; font-weight: bold; margin: 10px; height: 70px; }
        button { background-color: #b764d4; color: white; border: none; padding: 12px 24px; font-size: 18px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; max-width: 400px;}
        button:hover { background-color: #9a4ab8; }
        #success-msg { display: none; color: #b764d4; font-size: 24px; font-weight: bold; margin-top: 20px;}
    </style>
</head>
<body>
    <div id="setup">
        <button onclick="startCamera()">1. Turn on Camera </button>
    </div>

    <div id="camera-view" style="display: none;">
        <video id="video" autoplay playsinline></video>
        <div id="countdown"></div>
        <button id="startBtn" onclick="startTimer()">2. Start 3s Timer </button>
    </div>

    <div id="success-msg"> Photo Captured! Processing...</div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        // פונקציה ששולחת בסוף לסטרימליט
        function sendToStreamlit(type, data) {
            const message = Object.assign({ isStreamlitMessage: true, type: type }, data);
            window.parent.postMessage(message, "*");
        }

        // מדווחים לשרת שהרכיב מוכן וקובעים גובה התחלתי
        setTimeout(() => {
            sendToStreamlit("streamlit:componentReady", {apiVersion: 1});
            sendToStreamlit("streamlit:setFrameHeight", {height: 170});
        }, 100);

        // הלוגיקה של המצלמה
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const countdownDiv = document.getElementById('countdown');
        let stream;

        function startCamera() {
            navigator.mediaDevices.getUserMedia({ video: true })
                .then(s => {
                    stream = s;
                    video.srcObject = stream;
                    document.getElementById('setup').style.display = 'none';
                    document.getElementById('camera-view').style.display = 'block';
                    sendToStreamlit("streamlit:setFrameHeight", {height: 550});
                })
                .catch(err => { console.error("Camera error:", err); });
        }

        // הלוגיקה של הטיימר
        function startTimer() {
            document.getElementById('startBtn').style.display = 'none';
            let timeLeft = 3;
            countdownDiv.innerText = timeLeft;

            const timer = setInterval(() => {
                timeLeft -= 1;
                if (timeLeft > 0) {
                    countdownDiv.innerText = timeLeft;
                } else {
                    clearInterval(timer);
                    countdownDiv.innerText = "SNAP!";
                    takePhotoAuto();
                }
            }, 1000);
        }
        // צילום התמונה
        function takePhotoAuto() {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const context = canvas.getContext('2d');
            context.drawImage(video, 0, 0, canvas.width, canvas.height);

            // עצירת המצלמה
            stream.getTracks().forEach(track => track.stop());

            document.getElementById('camera-view').style.display = 'none';
            document.getElementById('success-msg').style.display = 'block';
            sendToStreamlit("streamlit:setFrameHeight", {height: 170});

            // שליחת התמונה לפייתון
            const dataURL = canvas.toDataURL('image/jpeg', 0.6);
            sendToStreamlit("streamlit:setComponentValue", {value: dataURL, dataType: "json"});
        }
    </script>
</body>
</html>
